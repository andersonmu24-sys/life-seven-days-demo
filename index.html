<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人生七天｜Demo Deck</title>
<style>
:root{--bg:#f4f0e7;--paper:#fffdf8;--ink:#1f241f;--muted:#6f746d;--line:#d8d0c3;--green:#2f684c;--soft:#dfeade;--warm:#efe1d4;--dark:#171b17}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;overflow:hidden;background:radial-gradient(circle at 18% 20%,rgba(47,104,76,.1),transparent 30%),radial-gradient(circle at 82% 80%,rgba(184,110,69,.1),transparent 32%),var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink)}
#deck{width:100vw;height:100vh;display:grid;place-items:center;padding:28px}.slide{width:min(1280px,calc(100vw - 56px));aspect-ratio:16/9;max-height:calc(100vh - 56px);background:var(--paper);border:1px solid var(--line);border-radius:34px;box-shadow:0 26px 80px rgba(40,35,25,.16);padding:54px 62px;position:relative;overflow:hidden}
.kicker{font-size:16px;letter-spacing:.13em;text-transform:uppercase;color:var(--green);font-weight:800}h1,h2,h3,p{margin:0}h1{font-size:72px;line-height:1.03;letter-spacing:-.055em}h2{font-size:49px;line-height:1.12;letter-spacing:-.045em}h3{font-size:27px;line-height:1.3}p{font-size:21px;line-height:1.55;color:#4e554e}.footer{position:absolute;left:62px;right:62px;bottom:26px;display:flex;justify-content:space-between;font-size:13px;color:rgba(31,36,31,.45)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:42px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:38px}.grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:28px}.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:40px}
.card{border:1px solid var(--line);background:#fffaf1;border-radius:24px;padding:24px}.green{background:var(--soft)}.warm{background:var(--warm)}.num{font:54px/1 Georgia,serif;color:var(--green);margin-bottom:14px}.label{font-size:15px;color:var(--muted);margin-bottom:14px}.pill{display:inline-flex;padding:7px 11px;border-radius:999px;background:var(--soft);color:var(--green);font-weight:800;font-size:14px;margin-bottom:15px}
.week{min-height:310px;position:relative}.week:before{content:"";position:absolute;left:25px;top:-14px;width:20px;height:20px;border-radius:50%;background:var(--green);box-shadow:0 0 0 8px rgba(47,104,76,.12)}.problem{display:grid;grid-template-columns:64px 1fr;gap:16px;margin-top:14px}.problem .icon{width:52px;height:52px;border-radius:17px;background:var(--warm);display:grid;place-items:center;color:#b86e45;font-size:24px}
.step{min-height:205px}.step p{font-size:16px}.role{display:grid;grid-template-columns:60px 1fr;gap:16px}.badge{width:54px;height:54px;border-radius:17px;background:var(--soft);display:grid;place-items:center;color:var(--green);font-size:22px;font-weight:900}
.outline{display:grid;grid-template-columns:1.05fr .95fr;gap:24px;margin-top:28px}.outline-list{display:grid;gap:10px}.outline-item{display:grid;grid-template-columns:48px 1fr;gap:14px;padding:15px 18px;border:1px solid var(--line);border-radius:17px;background:#fffaf1}.outline-item b{font:26px/1 Georgia,serif;color:var(--green)}.dark{background:var(--dark);color:white;border-radius:28px;padding:28px;display:flex;flex-direction:column;justify-content:space-between}.dark p{color:rgba(255,255,255,.72)}.line{padding:14px 16px;border-radius:15px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);margin-top:10px;font-size:18px}
.controls{position:fixed;left:50%;bottom:15px;transform:translateX(-50%);display:flex;gap:8px;align-items:center;background:rgba(255,253,248,.84);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:999px;padding:8px 10px}button{border:0;background:var(--ink);color:white;border-radius:999px;padding:8px 13px;cursor:pointer}#counter{min-width:58px;text-align:center;color:var(--muted);font-size:13px}
@media(max-width:900px){body{overflow:auto}#deck{height:auto;min-height:100vh;padding:14px}.slide{width:100%;height:auto;min-height:calc(100vh - 28px);aspect-ratio:auto;padding:32px 24px;border-radius:25px}.grid2,.grid3,.grid4,.grid5,.outline{grid-template-columns:1fr}h1{font-size:45px}h2{font-size:35px}.footer{position:static;margin-top:30px}.controls{position:sticky;margin:auto;width:max-content;bottom:10px}}
</style>
</head>
<body>
<div id="deck"></div>
<div class="controls"><button onclick="prev()">←</button><span id="counter"></span><button onclick="next()">→</button><button onclick="full()">全屏</button></div>
<script>
const slides=[{"kicker": "Life in seven days", "title": "人生七天", "subtitle": "每七天，重新看见一次自己。", "body": "一个从每周 Vlog 开始的 AI 自我观察实验。", "type": "cover"}, {"kicker": "Inspiration", "title": "从《人生七年》到《人生七天》", "cards": [["7年", "看见人生阶段的变化", "一个人如何被时代、家庭、选择和命运慢慢塑造。"], ["7天", "看见生活里更细微的自己", "每周一次，如果持续记录，会不会看见自己平时看不到的变化？"]], "type": "cards2"}, {"kicker": "First experiment", "title": "我先浅试验了 3 周", "body": "每周三，手机打开，直接录制。没有准备，没有大纲，没有整理，只是把这一周想到什么说出来。", "weeks": [["06.10 · 第一期", "AI探索 / 工作 / 播客冲突", "做了很多东西，也第一次看见“做成”和“真正使用”之间的距离。"], ["06.17 · 第二期", "身体接纳 / 普拉提 / 工作推进", "开始从评价身体，转向接受身体、训练身体。"], ["06.24 · 第三期", "无锡 / 游泳 / 生活现场", "生活经验变鲜活了，但上周留下的问题又被忘记。"]], "type": "weeks"}, {"kicker": "What broke", "title": "真实，但零散", "problems": [["记不住", "到周三再回忆时，前几天发生过什么已经模糊了。"], ["不连贯", "上周留下的问题，下一周可能忘记；每一期像独立片段。"], ["看不完整", "三周里其实有身体、工作、创造、关系的变化，但单次录制很难看见整体。"]], "type": "problems"}, {"kicker": "New insight", "title": "AI不是来替我总结", "subtitle": "AI真正能做的，是把真实生活重新连接起来。", "cards": [["补记忆", "找回本周真实发生过的事。"], ["接上周", "让问题和线索不会断掉。"], ["看变化", "从多周记录中发现自己看不到的模式。"]], "type": "cards3"}, {"kicker": "New flow", "title": "从一次 Vlog，变成一个 7 天飞轮", "steps": [["01", "自动输入", "抓取本地项目、MyBody、Flomo、运动、日历等真实证据。"], ["02", "自主录制", "周三先不看数据，手机直接录，保留最真实的记忆。"], ["03", "AI大纲", "根据本周数据和过去线索，生成补录问题。"], ["04", "补录内容", "把漏掉的事件、跨周问题和变化线讲完整。"], ["05", "网页沉淀", "形成自己的“人生七天” database。"]], "type": "steps"}, {"kicker": "AI roles", "title": "AI在系统里的四个角色", "roles": [["1", "自动输入数据", "从本地项目、MyBody、Flomo、运动/睡眠、日历等来源恢复本周事件。"], ["2", "持续追踪大纲", "持续追踪身体、工作、创造、关系和内在问题。"], ["3", "双线录制", "第一段自主录制；第二段基于AI大纲补录。"], ["4", "沉淀为网页", "每周内容变成可回看的个人数据库。"]], "type": "roles"}, {"kicker": "First thing to fix", "title": "第一步不是网页，是录制大纲", "outline": [["01", "此刻的我", "身体、情绪、精神状态。"], ["02", "不看记录，我记得的这一周", "保留最真实的主观记忆。"], ["03", "重新走过这七天", "用自动收集的数据补漏。"], ["04", "四条固定观察线", "身体、工作、关系、内在体验。"], ["05", "接着上一周看", "让问题和线索连续。"]], "type": "outline"}, {"kicker": "Database", "title": "后续沉淀成一个“人生七天”网站", "items": [["每周档案", "这一周真实发生了什么。"], ["记忆差异", "我记住的 vs 数据里发生的。"], ["长期变化线", "身体、工作、创造、关系如何连续变化。"], ["AI发现", "所有判断都能回到原始证据。"]], "type": "database"}, {"kicker": "Open growth", "title": "公开成长，看见自己的变化", "quote": "我想记录的不是一个完美的人，\n而是一个真实的人，如何在每七天里，慢慢看见自己。", "subtitle": "每七天，重新看见一次自己。", "type": "ending"}];let index=0;const deck=document.querySelector('#deck'),counter=document.querySelector('#counter');
function footer(i){return `<div class="footer"><span>人生七天 Demo</span><span>${String(i+1).padStart(2,'0')} / ${slides.length}</span></div>`}
function render(){
 const s=slides[index];let c=`<section class="slide"><div class="kicker">${s.kicker}</div>`;
 if(s.type==='cover')c+=`<div style="height:82%;display:grid;align-content:center"><h1>${s.title}</h1><p style="font-size:31px;color:var(--ink);margin-top:27px">${s.subtitle}</p><p style="margin-top:26px">${s.body}</p></div>`;
 else{c+=`<h2 style="margin-top:16px">${s.title}</h2>`;if(s.body)c+=`<p style="margin-top:17px;max-width:850px">${s.body}</p>`;if(s.subtitle)c+=`<p style="margin-top:24px;font-size:28px;color:var(--ink)">${s.subtitle}</p>`}
 if(s.type==='cards2')c+=`<div class="grid2">${s.cards.map((x,i)=>`<div class="card ${i?'warm':'green'}"><div class="num">${x[0]}</div><h3>${x[1]}</h3><p style="margin-top:14px">${x[2]}</p></div>`).join('')}</div>`;
 if(s.type==='weeks')c+=`<div class="grid3">${s.weeks.map(x=>`<div class="card week"><div class="label">${x[0]}</div><h3>${x[1]}</h3><p style="margin-top:13px">${x[2]}</p></div>`).join('')}</div>`;
 if(s.type==='problems')c+=`<div style="margin-top:24px">${s.problems.map((x,i)=>`<div class="card problem"><div class="icon">${['?','↯','⌁'][i]}</div><div><h3>${x[0]}</h3><p style="margin-top:5px">${x[1]}</p></div></div>`).join('')}</div>`;
 if(s.type==='cards3')c+=`<div class="grid3">${s.cards.map(x=>`<div class="card"><h3>${x[0]}</h3><p style="margin-top:12px">${x[1]}</p></div>`).join('')}</div>`;
 if(s.type==='steps')c+=`<div class="grid5">${s.steps.map(x=>`<div class="card step"><span class="pill">${x[0]}</span><h3>${x[1]}</h3><p style="margin-top:12px">${x[2]}</p></div>`).join('')}</div>`;
 if(s.type==='roles')c+=`<div class="grid4">${s.roles.map(x=>`<div class="card role"><div class="badge">${x[0]}</div><div><h3>${x[1]}</h3><p style="margin-top:6px">${x[2]}</p></div></div>`).join('')}</div>`;
 if(s.type==='outline')c+=`<div class="outline"><div class="outline-list">${s.outline.map(x=>`<div class="outline-item"><b>${x[0]}</b><div><h3 style="font-size:20px">${x[1]}</h3><p style="font-size:15px;margin-top:3px">${x[2]}</p></div></div>`).join('')}</div><div class="dark"><div><div class="kicker" style="color:rgba(255,255,255,.5)">Dual recording</div><h3 style="font-size:39px;margin-top:17px">双线录制</h3><div style="margin-top:20px"><div class="line">A线：不做准备，手机直接录制</div><div class="line">B线：AI读取数据后，生成补录大纲</div><div class="line">既保留真实表达，也补上遗漏和连续性</div></div></div><p>《人生七天》仍然是 Vlog，但开始具备长期观察能力。</p></div></div>`;
 if(s.type==='database')c+=`<div class="grid2">${s.items.map(x=>`<div class="card"><h3>${x[0]}</h3><p style="margin-top:8px">${x[1]}</p></div>`).join('')}</div>`;
 if(s.type==='ending')c+=`<div style="height:70%;display:grid;place-items:center;text-align:center"><div><p style="white-space:pre-line;font-family:Georgia,'Songti SC',serif;font-size:41px;color:var(--ink)">${s.quote}</p><p style="margin-top:35px;font-size:28px;color:var(--green);font-weight:800">${s.subtitle}</p></div></div>`;
 c+=footer(index)+'</section>';deck.innerHTML=c;counter.textContent=`${index+1} / ${slides.length}`;
}
function next(){index=(index+1)%slides.length;render()}function prev(){index=(index-1+slides.length)%slides.length;render()}function full(){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.()}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();if(e.key.toLowerCase()==='f')full()});render();
</script>
</body>
</html>
